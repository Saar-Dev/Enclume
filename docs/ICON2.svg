<svg viewBox="0 0 360 520" xmlns="http://www.w3.org/2000/svg">

  <style>
    :root{
      --c-head:#D9F7FF;
      --c-body:#D9F7FF;
      --c-left-arm:#D9F7FF;
      --c-right-arm:#D9F7FF;
      --c-left-leg:#D9F7FF;
      --c-right-leg:#D9F7FF;
      --bg:transparent;
    }

    svg{
      background:var(--bg);
    }

    path{
      stroke:none;
      transition:
        fill .2s ease,
        opacity .2s ease,
        filter .2s ease;
    }

    #head{fill:var(--c-head);}
    #body{fill:var(--c-body);}
    #left-arm{fill:var(--c-left-arm);}
    #right-arm{fill:var(--c-right-arm);}
    #left-leg{fill:var(--c-left-leg);}
    #right-leg{fill:var(--c-right-leg);}
  </style>


