<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{width:700px;min-height:160px;background:var(--bg-app);color:var(--text-primary);
    font-family:var(--font-ui);display:flex;box-sizing:border-box}
  .wrap{padding:20px 22px;display:flex;flex-direction:column;gap:14px;width:100%;box-sizing:border-box}
  .row{display:flex;gap:10px;align-items:stretch}
  .ey{font:var(--eyebrow);text-transform:uppercase;letter-spacing:.05em;color:var(--text-session-lo)}
  .sw{flex:1;border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;
    padding:10px;min-height:70px;border:1px solid rgba(255,255,255,.05)}
  .sw b{font:var(--label);font-weight:600}
  .sw code{font:11px var(--font-mono);opacity:.7;margin-top:2px}
</style></head><body><div class="wrap">
<div class="ey">Brand & semantic</div>
<div class="row">
  <div class="sw" style="background:#5b8dee;color:#0f1115"><b>Primary</b><code>#5b8dee</code></div><div class="sw" style="background:#1dd1a1;color:#0f1115"><b>Success</b><code>#1dd1a1</code></div><div class="sw" style="background:#ff6b6b;color:#0f1115"><b>Danger</b><code>#ff6b6b</code></div><div class="sw" style="background:#f0a04b;color:#0f1115"><b>Warning</b><code>#f0a04b</code></div><div class="sw" style="background:#f5c542;color:#0f1115"><b>Gold</b><code>#f5c542</code></div>
</div>
<div class="row">
  <div class="sw" style="background:#4caf77;color:#0f1115;min-height:54px"><b style="font-size:11px">Success soft</b><code>#4caf77</code></div><div class="sw" style="background:#e05b5b;color:#0f1115;min-height:54px"><b style="font-size:11px">Danger soft</b><code>#e05b5b</code></div><div class="sw" style="background:#e0a050;color:#0f1115;min-height:54px"><b style="font-size:11px">Warning soft</b><code>#e0a050</code></div><div class="sw" style="background:#aa8a30;color:#0f1115;min-height:54px"><b style="font-size:11px">Gold muted</b><code>#aa8a30</code></div><div class="sw" style="background:rgba(91,141,238,.18);color:#0f1115;min-height:54px"><b style="font-size:11px">Primary 18%</b><code>rgba(91,141,238,.18)</code></div>
</div></div></body></html>
