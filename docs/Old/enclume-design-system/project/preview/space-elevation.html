<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{width:700px;min-height:170px;background:var(--bg-app);color:var(--text-primary);
    font-family:var(--font-ui);display:flex;box-sizing:border-box}
  .wrap{padding:20px 22px;display:flex;flex-direction:column;gap:14px;width:100%;box-sizing:border-box}
  .ey{font:var(--eyebrow);text-transform:uppercase;letter-spacing:.05em;color:var(--text-session-lo)}
  .meta{font:11px var(--font-mono);color:#6b7280}
</style></head><body><div class="wrap">
<div class="ey">Elevation</div>
<div style="display:flex;gap:24px;align-items:center;padding:6px 4px 10px">
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:120px;height:64px;background:#16162a;border:1px solid #1e1e2e;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.2)"></div>
      <span class="meta">sm</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:120px;height:64px;background:#16162a;border:1px solid #1e1e2e;border-radius:8px;box-shadow:0 10px 30px rgba(0,0,0,.35)"></div>
      <span class="meta">md</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:120px;height:64px;background:#16162a;border:1px solid #1e1e2e;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.4)"></div>
      <span class="meta">window</span>
    </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
    <div style="width:80px;height:64px;background:#0f0f1a;border:2px solid rgba(245,197,66,.7);border-radius:6px;box-shadow:0 0 12px rgba(245,197,66,.35)"></div>
    <span class="meta">active halo</span>
  </div>
</div></div></body></html>
