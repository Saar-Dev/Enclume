<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{width:700px;min-height:210px;background:var(--bg-app);color:var(--text-primary);
    font-family:var(--font-ui);display:flex;box-sizing:border-box}
  .wrap{padding:20px 22px;display:flex;flex-direction:column;gap:14px;width:100%;box-sizing:border-box}
  .ey{font:var(--eyebrow);text-transform:uppercase;letter-spacing:.05em;color:var(--text-session-lo)}
  .meta{font:11px var(--font-mono);color:#6b7280}
</style></head><body><div class="wrap">
<div class="ey">Inter — UI scale</div>

  <div style="display:flex;align-items:baseline;gap:14px"><span style="font:500 16px/1.3 'Inter'">Gestion des dégâts</span><span class="meta">H2 · 16 / 500</span></div>
  <div style="display:flex;align-items:baseline;gap:14px"><span style="font:600 13px/1.4 'Inter'">Compétence d'arme</span><span class="meta">H3 · 13 / 600</span></div>
  <div style="display:flex;align-items:baseline;gap:14px"><span style="font:400 14px/1.5 'Inter';color:#9aa4b2">Le défenseur lance son dé interactivement.</span><span class="meta">Body · 14 / 400</span></div>
  <div style="display:flex;align-items:baseline;gap:14px"><span style="font:500 12px/1.4 'Inter';color:#9aa4b2">Code d'invitation</span><span class="meta">Label · 12 / 500</span></div>
</div></div></body></html>
