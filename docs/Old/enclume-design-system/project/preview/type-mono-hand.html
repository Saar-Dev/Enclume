<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{width:700px;min-height:180px;background:var(--bg-app);color:var(--text-primary);
    font-family:var(--font-ui);display:flex;box-sizing:border-box}
  .wrap{padding:20px 22px;display:flex;flex-direction:column;gap:14px;width:100%;box-sizing:border-box}
  .ey{font:var(--eyebrow);text-transform:uppercase;letter-spacing:.05em;color:var(--text-session-lo)}
  .meta{font:11px var(--font-mono);color:#6b7280}
</style></head><body><div class="wrap">
<div class="ey">Share Tech Mono — numbers & dice · Caveat — handwritten accents</div>
<div style="display:flex;gap:40px;align-items:center;margin-top:6px">
  <div style="display:flex;flex-direction:column;gap:4px">
    <span style="font:700 34px/1 'Share Tech Mono';color:#e8eef7;font-variant-numeric:tabular-nums">17 <span style="font-size:16px;color:#456575">/ 12</span></span>
    <span class="meta">dice total · invite #X7K2 · stats</span>
  </div>
  <div style="width:1px;height:54px;background:#1e1e2e"></div>
  <div style="display:flex;flex-direction:column;gap:2px">
    <span style="font:400 30px/1 'Caveat';color:#9aa4b2">Note du MJ — méfie-toi du pont</span>
    <span class="meta">flavor / GM notes accent</span>
  </div>
</div></div></body></html>
