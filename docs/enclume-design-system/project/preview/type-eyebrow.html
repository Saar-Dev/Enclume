<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{width:700px;min-height:160px;background:var(--bg-app);color:var(--text-primary);
    font-family:var(--font-ui);display:flex;box-sizing:border-box}
  .wrap{padding:20px 22px;display:flex;flex-direction:column;gap:14px;width:100%;box-sizing:border-box}
  .hd{font:600 11px/1.2 'Inter';text-transform:uppercase;letter-spacing:.08em;color:#9aa4b2}
  .meta{font:11px var(--font-mono);color:#8b93a3}
</style></head><body><div class="wrap">
<div class="hd">Eyebrow — signature micro all-caps label · 10px / 600 / +0.05em</div>

<!-- large legible specimen -->
<div style="display:flex;align-items:center;gap:18px">
  <span style="font:600 16px/1 'Inter';text-transform:uppercase;letter-spacing:.12em;color:#c8cedb">Déclaration</span>
  <span style="font:600 10px/1 'Inter';text-transform:uppercase;letter-spacing:.5px;color:#7c8398">↑ shown 16px for legibility · ships at 10px</span>
</div>

<!-- tab states with the two real contrast levels, clearly labelled -->
<div style="display:flex;gap:28px;align-items:center">
  <span style="font:600 10px/1.2 'Inter';text-transform:uppercase;letter-spacing:.5px;color:#c0c0d0;border-bottom:2px solid #5b8dee;padding-bottom:6px">Chat</span>
  <span style="font:600 10px/1.2 'Inter';text-transform:uppercase;letter-spacing:.5px;color:#7c8398">Persos</span>
  <span style="font:600 10px/1.2 'Inter';text-transform:uppercase;letter-spacing:.5px;color:#7c8398">Joueurs</span>
  <span style="font:600 10px/1.2 'Inter';text-transform:uppercase;letter-spacing:.5px;color:#7c8398">Config</span>
  <span class="meta">active #c0c0d0 · inactive #7c8398</span>
</div>
<div class="meta" style="margin-top:2px">Used on sidebar tabs, section headers & phase indicators. In-app inactive tabs run dimmer (#4a4a60) by design.</div>
</div></body></html>
