<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{width:700px;min-height:160px;background:#06070c;color:#c0c8d0;font-family:'Inter',sans-serif;display:flex;box-sizing:border-box}
  .wrap{padding:20px 22px;display:flex;flex-direction:column;gap:13px;width:100%;box-sizing:border-box}
  .ey{font:600 10px/1.2 'Inter';text-transform:uppercase;letter-spacing:.1em;color:#5a8aaa}
  .meta{font:11px 'Share Tech Mono';color:#3a4a5a}
  .row{display:flex;gap:8px;align-items:stretch}
  .sw{flex:1;border-radius:4px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;min-height:62px;border:1px solid rgba(255,255,255,.05)}
  .sw b{font:600 10px 'Inter'}
  .sw code{font:10px 'Share Tech Mono';opacity:.75;margin-top:2px}
</style></head><body><div class="wrap">
<div class="ey">HUD Combat — structure des fenêtres tactiques</div>
<div class="row">
  <div class="sw" style="background:#0d0f18"><b>Body</b><code>#0d0f18</code></div><div class="sw" style="background:#080a12"><b>Header</b><code>#080a12</code></div><div class="sw" style="background:#1e2435"><b>Border</b><code>#1e2435</code></div><div class="sw" style="background:#1e1e2e"><b>Section</b><code>#1e1e2e</code></div><div class="sw" style="background:#10141e"><b>Row line</b><code>#10141e</code></div><div class="sw" style="background:#0a1018"><b>Seg bg</b><code>#0a1018</code></div>
</div>
<div class="meta">Palette distincte — plus froide/sombre que l'UI principale · ombre 0 8px 32px rgba(0,0,0,.7)</div></div></body></html>
