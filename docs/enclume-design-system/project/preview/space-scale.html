<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{width:700px;min-height:160px;background:var(--bg-app);color:var(--text-primary);
    font-family:var(--font-ui);display:flex;box-sizing:border-box}
  .wrap{padding:20px 22px;display:flex;flex-direction:column;gap:14px;width:100%;box-sizing:border-box}
  .ey{font:var(--eyebrow);text-transform:uppercase;letter-spacing:.05em;color:var(--text-session-lo)}
  .meta{font:11px var(--font-mono);color:#6b7280}
</style></head><body><div class="wrap">
<div class="ey">Spacing — 4px base</div>
<div style="display:flex;flex-direction:column;gap:9px;margin-top:2px">
  
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:4px;height:14px;background:#5b8dee;border-radius:2px"></div>
      <span class="meta">xs · 4px</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:8px;height:14px;background:#5b8dee;border-radius:2px"></div>
      <span class="meta">sm · 8px</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:12px;height:14px;background:#5b8dee;border-radius:2px"></div>
      <span class="meta">md · 12px</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:16px;height:14px;background:#5b8dee;border-radius:2px"></div>
      <span class="meta">lg · 16px</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:24px;height:14px;background:#5b8dee;border-radius:2px"></div>
      <span class="meta">xl · 24px</span>
    </div>
</div></div></body></html>
