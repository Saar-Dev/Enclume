<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{width:700px;min-height:150px;background:var(--bg-app);color:var(--text-primary);
    font-family:var(--font-ui);display:flex;box-sizing:border-box}
  .wrap{padding:20px 22px;display:flex;flex-direction:column;gap:14px;width:100%;box-sizing:border-box}
  .row{display:flex;gap:10px;align-items:stretch}
  .ey{font:var(--eyebrow);text-transform:uppercase;letter-spacing:.05em;color:var(--text-session-lo)}
  .sw{flex:1;border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;
    padding:10px;min-height:70px;border:1px solid rgba(255,255,255,.05)}
  .sw b{font:var(--label);font-weight:600}
  .sw code{font:11px var(--font-mono);opacity:.7;margin-top:2px}
</style></head><body><div class="wrap">
<div class="ey">Surfaces — app shell → elevated</div>
<div class="row">
  <div class="sw" style="background:#0f1115"><b>App</b><code>#0f1115</code></div><div class="sw" style="background:#151923"><b>Surface</b><code>#151923</code></div><div class="sw" style="background:#10131b"><b>Panel</b><code>#10131b</code></div><div class="sw" style="background:#1b2232"><b>Elevated</b><code>#1b2232</code></div><div class="sw" style="background:#0c0f16"><b>Input</b><code>#0c0f16</code></div>
</div></div></body></html>
