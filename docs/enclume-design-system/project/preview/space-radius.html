<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{width:700px;min-height:150px;background:var(--bg-app);color:var(--text-primary);
    font-family:var(--font-ui);display:flex;box-sizing:border-box}
  .wrap{padding:20px 22px;display:flex;flex-direction:column;gap:14px;width:100%;box-sizing:border-box}
  .ey{font:var(--eyebrow);text-transform:uppercase;letter-spacing:.05em;color:var(--text-session-lo)}
  .meta{font:11px var(--font-mono);color:#6b7280}
</style></head><body><div class="wrap">
<div class="ey">Corner radius</div>
<div style="display:flex;gap:18px;align-items:flex-end">
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div style="width:84px;height:60px;background:linear-gradient(180deg,#151923,#10131b);border:1px solid #252b3a;border-radius:4px"></div>
      <span class="meta">xs · 4px</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div style="width:84px;height:60px;background:linear-gradient(180deg,#151923,#10131b);border:1px solid #252b3a;border-radius:6px"></div>
      <span class="meta">sm · 6px</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div style="width:84px;height:60px;background:linear-gradient(180deg,#151923,#10131b);border:1px solid #252b3a;border-radius:12px"></div>
      <span class="meta">md · 12px</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div style="width:84px;height:60px;background:linear-gradient(180deg,#151923,#10131b);border:1px solid #252b3a;border-radius:14px"></div>
      <span class="meta">lg · 14px</span>
    </div>
</div></div></body></html>
