    function readAddForm(){
      const armorVisible = !document.getElementById("armorFields").classList.contains("hidden");
      const portableVisible = !document.getElementById("portableFields").classList.contains("hidden");

      let loc = "";
      let armureMalus = "";

      if (portableVisible) {
        loc = getCheckedValues(["add_portable_dos","add_portable_ceinture"]).join(" | ");
        armureMalus = document.getElementById("add_portable_armureMalus").value || "";
      } else if (armorVisible) {
        loc = getCheckedValues([
          "add_loc_tete","add_loc_corps","add_loc_bras_g",
          "add_loc_bras_d","add_loc_jambe_g","add_loc_jambe_d"
        ]).join(" | ");
        armureMalus = document.getElementById("add_armureMalus").value || "";
      }

      const modeTir = getCheckedValues(["add_mode_cc","add_mode_rc","add_mode_rl"]).join("/");

      return {
        name: document.getElementById("add_name").value || "",
        notes: document.getElementById("add_notes").value || "",
        family: document.getElementById("add_family").value || "",
        category: document.getElementById("add_category").value || "",
        emplacement: document.getElementById("add_emplacement").value || "",
        quantity: document.getElementById("add_quantity").value || "1",
        weight: document.getElementById("add_weight").value || "0",
        description: document.getElementById("add_description").value || "",

        nt: document.getElementById("add_nt").value || "",
        fabricant: document.getElementById("add_fabricant").value || "",
        nation: document.getElementById("add_nation").value || "",
        dispo: document.getElementById("add_dispo").value || "",

        dom: document.getElementById("add_dom").value || "",
        choc: document.getElementById("add_choc").value || "",
        portee: document.getElementById("add_portee").value || "",
        for: document.getElementById("add_for").value || "",
        init: document.getElementById("add_init").value || "",
        modeTir: modeTir,
        cal: document.getElementById("add_cal").value || "",

        prot: document.getElementById("add_prot").value || "",
        protChoc: document.getElementById("add_protChoc").value || "",
        loc: loc,
        armureMalus: armureMalus,

        contenance: document.getElementById("add_contenance").value || "",
        etancheite: document.getElementById("add_etancheite").value || ""
      };
    }

    function resetAddForm(){
      [
        "add_name","add_notes","add_family","add_category","add_weight","add_dispo",
        "add_nt","add_fabricant","add_nation","add_contenance","add_etancheite",
        "add_dom","add_choc","add_portee","add_for","add_init",
        "add_prot","add_protChoc","add_description"
      ].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = "";
      });

      document.getElementById("add_quantity").value = "1";
      document.getElementById("add_armureMalus").value = "";
      document.getElementById("add_portable_armureMalus").value = "";
      buildAddContainerSelect();
      buildCaliberSelect("");
      hideEquipSuggestions();
      updateAddConditionalSections(null);

      setCheckedValues(["add_mode_cc","add_mode_rc","add_mode_rl"], "");
      setCheckedValues(["add_loc_tete","add_loc_corps","add_loc_bras_g","add_loc_bras_d","add_loc_jambe_g","add_loc_jambe_d"], "");
      setCheckedValues(["add_portable_dos","add_portable_ceinture"], "");
    }

    function submitAddItem(){
      const payload = readAddForm();
      const btn = document.getElementById("addSubmitBtn");
      const err = document.getElementById("addError");

      err.textContent = "";
      btn.disabled = true;
      setMsg("Ajout de l'objet...");

      google.script.run
        .withSuccessHandler(res => {
          btn.disabled = false;

          if (!res || res.ok === false) {
            err.textContent = (res && res.error) || "Ajout impossible.";
            setMsg("Erreur: " + ((res && res.error) || "ajout impossible"));
            return;
          }

          applyContext(res);
          if (res.selectedItemId) INV_STATE.selectedItemId = Number(res.selectedItemId || 0);
          closeAddModal();
          resetAddForm();
          renderInventory();
          setMsg(res.message || "Objet ajouté.");
        })
        .withFailureHandler(error => {
          hideLoading();
          btn.disabled = false;
          const msg = error && error.message ? error.message : String(error);
          err.textContent = msg;
          setMsg("Erreur: " + msg);
        })
        .inventory_addManualItem(FID, payload);
    }

    function searchEquipCatalog(query){
      const q = normalizeText(query || "");
      if (!q) return [];
      return EQUIP_CATALOG.filter(e => normalizeText(e.name).indexOf(q) !== -1).slice(0, 8);
    }

    function findExactEquipByName(name){
      const key = normalizeText(name || "");
      if (!key) return null;
      return EQUIP_CATALOG.find(e => normalizeText(e.name) === key) || null;
    }

    function fillAddFormFromEquip(entry){
      if (!entry) return;

      document.getElementById("add_name").value = entry.name || "";
      document.getElementById("add_family").value = entry.family || "";
      document.getElementById("add_category").value = entry.category || "";
      document.getElementById("add_description").value = entry.description || "";
      document.getElementById("add_dispo").value = entry.dispo || "";

      const w = Number(entry.weight || 0);
      if (Number.isFinite(w)) {
        document.getElementById("add_weight").value = String(w).replace(",", ".");
      }

      document.getElementById("add_nt").value = entry.catalogNT || "";
      document.getElementById("add_fabricant").value = entry.catalogFabricant || "";
      document.getElementById("add_nation").value = entry.catalogNation || "";

      document.getElementById("add_dom").value = entry.catalogArmeDom || "";
      document.getElementById("add_choc").value = entry.catalogArmeChoc || "";
      document.getElementById("add_portee").value = entry.catalogArmePortee || "";
      document.getElementById("add_for").value = entry.catalogArmeFOR || "";
      document.getElementById("add_init").value = entry.catalogArmeInit || "";
      buildCaliberSelect(entry.catalogArmeCAL || "");
      document.getElementById("add_cal").value = entry.catalogArmeCAL || "";

      document.getElementById("add_prot").value = entry.catalogArmureProt || "";
      document.getElementById("add_protChoc").value = entry.catalogArmureChoc || "";
      document.getElementById("add_armureMalus").value = entry.catalogArmureMal || "";

      document.getElementById("add_contenance").value = entry.catalogContenance || "";
      document.getElementById("add_etancheite").value = entry.catalogEtancheite || "";
      document.getElementById("add_portable_armureMalus").value = entry.catalogArmureMal || "";

      setCheckedValues(["add_mode_cc","add_mode_rc","add_mode_rl"], entry.catalogArmeModeTir || "");
      setCheckedValues(["add_loc_tete","add_loc_corps","add_loc_bras_g","add_loc_bras_d","add_loc_jambe_g","add_loc_jambe_d"], entry.catalogArmureLoc || "");
      setCheckedValues(["add_portable_dos","add_portable_ceinture"], entry.catalogArmureLoc || "");

      updateAddConditionalSections(entry);
      hideEquipSuggestions();
    }

    function renderEquipSuggestions(list){
      const box = document.getElementById("equipSuggest");
      if (!box) return;

      if (!list.length) {
        hideEquipSuggestions();
        return;
      }

      box.innerHTML = list.map((e, idx) => `
        <div class="suggestItem" data-suggest-idx="${idx}">
          <div class="suggestName">${escapeHtml(e.name || "")}</div>
          <div class="small muted">${escapeHtml(e.family || "—")} • ${escapeHtml(e.category || "—")}</div>
        </div>
      `).join("");

      box.classList.add("open");

      box.querySelectorAll("[data-suggest-idx]").forEach(el => {
        el.addEventListener("mousedown", (ev) => {
          ev.preventDefault();
          const i = Number(el.getAttribute("data-suggest-idx") || 0);
          fillAddFormFromEquip(list[i]);
        });
      });
    }

    function hideEquipSuggestions(){
      const box = document.getElementById("equipSuggest");
      if (!box) return;
      box.classList.remove("open");
      box.innerHTML = "";
    }

    function handleAddNameInput(){
      const input = document.getElementById("add_name");
      if (!input) return;
      const q = String(input.value || "");
      renderEquipSuggestions(searchEquipCatalog(q));
      updateAddConditionalSections(null);
    }

    function tryAutoFillExactEquip(){
      const input = document.getElementById("add_name");
      if (!input) return;
      const exact = findExactEquipByName(input.value || "");
      if (exact) fillAddFormFromEquip(exact);
    }

    function initAutocomplete(){
      const input = document.getElementById("add_name");
      if (!input) return;

      input.addEventListener("input", handleAddNameInput);
      input.addEventListener("blur", () => {
        if (suggestHideTimer) clearTimeout(suggestHideTimer);
        suggestHideTimer = setTimeout(() => {
          tryAutoFillExactEquip();
          hideEquipSuggestions();
        }, 120);
      });

      document.addEventListener("click", (e) => {
        const wrap = document.querySelector(".autocompleteWrap");
        if (!wrap) return;
        if (!wrap.contains(e.target)) hideEquipSuggestions();
      });

      document.getElementById("add_family").addEventListener("input", () => updateAddConditionalSections(null));
      document.getElementById("add_category").addEventListener("input", () => updateAddConditionalSections(null));
    }

    function bootInventory(){
      if (!FID){
        setMsg("FID manquant.");
        return;
      }

      showLoading("Chargement de l'inventaire…");
      google.script.run
        .withSuccessHandler(res => {
          hideLoading();
          if (!res || res.ok === false) {
            setMsg("Erreur: " + ((res && res.error) || "chargement impossible"));
            return;
          }

          applyContext(res);
          setDbg(`FID=${FID} — objets=${(res.items || []).length} — containers=${(res.containers || []).length}`);
          setMsg("OK.");
        })
        .withFailureHandler(err => {
          hideLoading();
          setMsg("Erreur: " + (err && err.message ? err.message : String(err)));
        })
        .inventory_getContext(FID);
    }

    function initAutoFilters(){
      document.getElementById("searchInput").addEventListener("input", () => {
        if (renderTimer) clearTimeout(renderTimer);
        renderTimer = setTimeout(renderInventory, 140);
      });

      document.getElementById("sortSel").addEventListener("change", renderInventory);
      document.getElementById("groupModeSel").addEventListener("change", () => {
        INV_STATE.selectedItemId = 0;
        renderInventory();
      });

      document.getElementById("results").addEventListener("click", (e) => {
        const familyBtn = e.target.closest("[data-family-select]");
        if (familyBtn) {
          const fam = String(familyBtn.getAttribute("data-family-select") || "").trim();
          if (fam !== FAMILY_VIEW_SELECTED) {
            flushPendingDetailAutosave();
            const groupedFamilies = groupItemsByFamily(getFilteredItems());
            applyFamilySelection(fam, groupedFamilies, "_root_");
            renderInventory();
          }
          return;
        }

        const containerBtn = e.target.closest("[data-container-select]");
        if (containerBtn) {
          const container = String(containerBtn.getAttribute("data-container-select") || "").trim();
          if (container !== CONTAINER_VIEW_SELECTED) {
            flushPendingDetailAutosave();
            const groupedContainers = groupItemsByContainer(getFilteredItems());
            applyContainerSelection(container, groupedContainers, "_root_");
            renderInventory();
          }
          return;
        }

        const card = e.target.closest(".itemCard");
        if (!card) return;

        const itemId = Number(card.getAttribute("data-item-id") || 0);
        if (!itemId) return;

        if (Number(INV_STATE.selectedItemId || 0) === itemId) return;

        flushPendingDetailAutosave();
        INV_STATE.selectedItemId = itemId;

        document.querySelectorAll("#results .itemCard.active").forEach(el => el.classList.remove("active"));
        card.classList.add("active");

        const item = findItemById(itemId);
        renderDetail(item);
      });

      document.getElementById("detailHost").addEventListener("click", (e) => {
        const btn = e.target.closest("[data-detail-action]");
        if (!btn || btn.disabled) return;

        const action = String(btn.getAttribute("data-detail-action") || "").trim();
        if (action === "move") {
          openMoveAction();
          return;
        }
        if (action === "split") {
          openSplitAction();
          return;
        }
        if (action === "transfer") {
          openTransferAction();
          return;
        }
        if (action === "delete") {
          openDeleteAction();
        }
      });
    }

    function initIds(){
      FID = String("<?= fid ?>" || "").trim();

      if (!FID && window.google && google.script && google.script.url && google.script.url.getLocation){
        google.script.url.getLocation(loc => {
          FID = FID || String(loc && loc.parameter && loc.parameter.fid || "").trim();
          if (!FID){
            setMsg("Paramètres manquants (?fid=...)");
            return;
          }
          bootInventory();
        });
        return;
      }

      if (!FID){
        const qs = new URLSearchParams(window.location.search);
        FID = FID || String(qs.get("fid") || "").trim();
      }

      if (!FID){
        setMsg("Paramètres manquants (?fid=...)");
        return;
      }

      bootInventory();
    }

    document.getElementById("miniActionModal").addEventListener("click", (e) => { if (e.target && e.target.id === "miniActionModal") closeMiniActionModal(); });
    document.getElementById("miniActionModal").addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeMiniActionModal();
      if (e.key === "Enter") {
        const confirmBtn = document.getElementById("miniActionConfirmBtn");
        if (confirmBtn && !confirmBtn.disabled) confirmBtn.click();
      }
    });

    initAutoFilters();
    initAutocomplete();
    initIds();
    window.addEventListener("resize", scheduleStickyLayoutUpdate);
  </script>
</body>
</html>
